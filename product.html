<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <title>Товар | Прицепы в Смоленске</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <header class="header" data-header>
        <div class="container header__container">
            <a href="/" class="header__logo">
                <img src="img/logo.png" alt="Прицепы Смоленск" class="header__logo-img" width="180" height="60">
            </a>
            <nav class="header__nav">
                <ul class="header__menu">
                    <li class="header__menu-item"><a href="/" class="header__menu-link">Главная</a></li>
                    <li class="header__menu-item"><a href="catalog.html" class="header__menu-link">Каталог</a></li>
                    <li class="header__menu-item"><a href="about.html" class="header__menu-link">О компании</a></li>
                    <li class="header__menu-item"><a href="services.html" class="header__menu-link">Услуги</a></li>
                    <li class="header__menu-item"><a href="contacts.html" class="header__menu-link">Контакты</a></li>
                </ul>
            </nav>
            <div class="header__actions">
                <div class="header__search">
                    <form class="search-form" role="search" action="catalog.html">
                        <input type="search" class="search-form__input" placeholder="Поиск по товарам" aria-label="Поиск" name="q">
                        <button type="submit" class="search-form__btn" aria-label="Найти">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </form>
                </div>
                <a href="cart.html" class="header__cart" aria-label="Корзина">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span class="header__cart-count" data-cart-count>0</span>
                </a>
                <div class="header__contacts-block">
                    <a href="tel:+74812600310" class="header__phone">+7 (4812) 600-310</a>
                    <span class="header__work-time">Пн-Вс: 9:00 - 18:00</span>
                </div>
            </div>
            <button class="header__burger" aria-label="Открыть меню" aria-expanded="false" data-burger>
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="header__mobile-menu" data-mobile-menu>
            <nav class="header__mobile-nav">
                <ul class="header__mobile-menu-list">
                    <li><a href="/" class="header__mobile-menu-link">Главная</a></li>
                    <li><a href="catalog.html" class="header__mobile-menu-link">Каталог</a></li>
                    <li><a href="about.html" class="header__mobile-menu-link">О компании</a></li>
                    <li><a href="services.html" class="header__mobile-menu-link">Услуги</a></li>
                    <li><a href="contacts.html" class="header__mobile-menu-link">Контакты</a></li>
                </ul>
                <div class="header__mobile-contacts">
                    <a href="tel:+74812600310" class="header__mobile-phone">+7 (4812) 600-310</a>
                    <span class="header__mobile-work-time">Пн-Вс: 9:00 - 18:00</span>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-padding">
            <div class="container">
                <div class="product-detail" id="product-detail" data-animate></div>
                <div class="similar-products" id="similar-products" style="display:none">
                    <h2 class="similar-products__title" data-animate>Похожие товары</h2>
                    <div class="similar-grid" id="similar-grid" data-animate-stagger></div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__container">
            <div class="footer__bar">
                <img src="img/logo.png" alt="Прицепы Смоленск" class="footer__logo" width="180" height="60">
                <p class="footer__copyright">&copy; 2024 Прицепы в Смоленске. Все права защищены.</p>
                <a href="privacy.html" class="footer__privacy">Политика конфиденциальности</a>
            </div>
        </div>
    </footer>

    <button class="back-to-top" aria-label="Наверх" data-back-to-top>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 15l-6-6-6 6"/>
        </svg>
    </button>

    <script src="js/products.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const productId = parseInt(params.get('id'));
        const product = products.find(p => p.id === productId);

        const detailEl = document.getElementById('product-detail');
        const similarEl = document.getElementById('similar-products');
        const similarGrid = document.getElementById('similar-grid');

        if (!product) {
            detailEl.innerHTML = '<div class="catalog-empty"><div class="catalog-empty__title">Товар не найден</div><p class="catalog-empty__text"><a href="catalog.html" class="btn btn--outline">Вернуться в каталог</a></p></div>';
            return;
        }

        document.title = `${product.name} | Прицепы в Смоленске`;
        document.querySelector('meta[name="description"]').content = product.description;

        const oldPriceHtml = product.oldPrice ? `<span class="product-detail__old-price">${product.oldPrice.toLocaleString()} ₽</span>` : '';

        detailEl.innerHTML = `
            <div class="product-detail__gallery">
                <img src="${product.image}" alt="${product.name}" class="product-detail__image">
            </div>
            <div class="product-detail__info">
                <span class="product-detail__category">${product.category}</span>
                <h1 class="product-detail__name">${product.name}</h1>
                <div class="product-detail__rating">
                    ★★★★★ <span>4.9 (127 отзывов)</span>
                </div>
                <div class="product-detail__price-block">
                    <span class="product-detail__price">${product.price.toLocaleString()} ₽</span>
                    ${oldPriceHtml}
                </div>
                <div class="product-detail__actions">
                    <button class="btn btn--primary btn--large" data-add-to-cart data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" data-image="${product.image}">В корзину</button>
                    <a href="tel:+74812600310" class="btn btn--outline btn--large">Позвонить</a>
                </div>
                <p class="product-detail__description">${product.description}</p>
                <h3 class="product-detail__specs-title">Характеристики</h3>
                <ul class="product-detail__specs">
                    ${product.specs.map(s => `
                        <li class="product-detail__spec">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"></polyline>
                            </svg>
                            ${s}
                        </li>
                    `).join('')}
                </ul>
            </div>
        `;

        const similar = products.filter(p => p.categorySlug === product.categorySlug && p.id !== product.id).slice(0, 4);
        if (similar.length > 0) {
            similarEl.style.display = 'block';
            similarGrid.innerHTML = similar.map(p => {
                const badgeClass = p.badge === 'Хит продаж' || p.badge === 'Хит' ? 'hit' :
                    p.badge === 'Новинка' ? 'new' : 'sale';
                const oldPrice = p.oldPrice ? `<span class="catalog-card__old-price">${p.oldPrice.toLocaleString()} ₽</span>` : '';
                return `
                    <a href="product.html?id=${p.id}" class="catalog-card">
                        ${p.badge ? `<span class="catalog-card__badge catalog-card__badge--${badgeClass}">${p.badge}</span>` : ''}
                        <div class="catalog-card__image-wrapper">
                            <img src="${p.image}" alt="${p.name}" class="catalog-card__image" loading="lazy">
                        </div>
                        <div class="catalog-card__body">
                            <span class="catalog-card__category">${p.category}</span>
                            <h3 class="catalog-card__name">${p.name}</h3>
                            <div class="catalog-card__price-block">
                                <span class="catalog-card__price">${p.price.toLocaleString()} ₽</span>
                                ${oldPrice}
                            </div>
                        </div>
                    </a>
                `;
            }).join('');
        }
    });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
